name: Public Flows Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.env.example'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'routes/web.php'
      - 'routes/api.php'
      - 'app/Http/Controllers/HomeController.php'
      - 'app/Http/Controllers/GrammarTestController.php'
      - 'app/Http/Controllers/IrregularVerbsTestController.php'
      - 'app/Http/Controllers/NewDesignTestController.php'
      - 'app/Http/Controllers/SiteSearchController.php'
      - 'app/Http/Controllers/TestJsV2Controller.php'
      - 'app/Http/Controllers/WordSearchController.php'
      - 'app/Http/Controllers/WordsTestController.php'
      - 'app/Http/Middleware/SetLocale.php'
      - 'app/Models/**'
      - 'app/Modules/LanguageManager/**'
      - 'app/Providers/RouteServiceProvider.php'
      - 'app/Services/**'
      - 'resources/views/catalog-tests-cards.blade.php'
      - 'resources/views/components/word-search.blade.php'
      - 'resources/views/home.blade.php'
      - 'resources/views/layouts/catalog-public.blade.php'
      - 'resources/views/search/**'
      - 'resources/views/test-modes/**'
      - 'resources/views/test-show.blade.php'
      - 'resources/views/verbs/**'
      - 'resources/views/words/**'
      - 'tests/Feature/PublicFlows/**'
      - 'tests/Support/PublicRouteMatrix.php'
      - 'tests/TestCase.php'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-flows-smoke:
    name: Public Flows Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Run public learner-flow smoke suite
        run: php artisan test tests/Feature/PublicFlows
