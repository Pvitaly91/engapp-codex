name: Theory Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.env.example'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'routes/web.php'
      - 'app/Http/Controllers/PageController.php'
      - 'app/Http/Controllers/TheoryController.php'
      - 'app/Http/Middleware/SetLocale.php'
      - 'app/Models/Page.php'
      - 'app/Models/PageCategory.php'
      - 'app/Models/TextBlock.php'
      - 'app/Modules/LanguageManager/**'
      - 'app/Providers/RouteServiceProvider.php'
      - 'app/Support/Database/**'
      - 'app/Support/TheoryTagLabel.php'
      - 'database/seeders/Page_V3/**'
      - 'database/seeders/SiteTreeSeeder.php'
      - 'resources/views/components/text-block-*.blade.php'
      - 'resources/views/layouts/catalog-public.blade.php'
      - 'resources/views/theory/**'
      - 'tests/Feature/Theory/**'
      - 'tests/Support/TheoryRouteMatrix.php'
      - 'tests/TestCase.php'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  theory-smoke:
    name: Theory Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Run theory smoke and regression suite
        run: php artisan test tests/Feature/Theory
